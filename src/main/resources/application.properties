spring.application.name=wsrcitamedica
spring.profiles.active=dev

#Configuración común
spring.sql.init.mode=never
spring.jpa.open-in-view=false

spring.jackson.time-zone=America/Lima
spring.mvc.timezone=America/Lima
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.serialization.write-dates-as-timestamps=false

# Configuración de Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.packages-to-scan=ccom.jhontruse.wsrcitamedica.controller
springdoc.paths-to-match=/wsrcitamedica/**
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true

security.jwt.issuer=wsrcitamedica
security.jwt.max-attempts=5
security.jwt.temp-lock-minutes=5
jwt.expiration=1800000
jwt.refresh.expiration=86400000
security.cors.allowed-origins:http://localhost:4200,http://localhost:8080

logging.file.path=/Users/jhontrujilloserrano/developer/logs/wsrCitaMedica/
logging.file.name=wsrcitamedica

# Nivel de log por defecto
logging.level.root=INFO
logging.level.com.example=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
