# Ruta de logs en servidor staging (Linux)
logging.file.path=/var/log/miapp/stage
logging.file.name=miapp-stage

# Niveles de log en staging (similar a producción)
logging.level.root=INFO
logging.level.com.example=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN

# Sin SQL en staging
spring.jpa.show-sql=false
