server.port=8080

# ================================================
# DATASOURCE - MySQL + HikariCP (ajuste recomendado)
# ================================================
spring.datasource.url=jdbc:mysql://localhost:3306/DB_CITA_MEDICA?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&failOverReadOnly=false&tcpKeepAlive=true&useLegacyDatetimeCode=false
spring.datasource.username=root
spring.datasource.password=admin123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10

# ============ HikariCP - POOL DE CONEXIONES ============
# Nombre interno del pool
spring.datasource.hikari.pool-name=CitaMedicaPool
# Cantidad mínima de conexiones vivas
spring.datasource.hikari.minimum-idle=5
# Tiempo máximo esperando una conexión antes de timeout
spring.datasource.hikari.connection-timeout=30000
# Tiempo para mantener conexiones vivas
spring.datasource.hikari.idle-timeout=600000
# Tiempo máximo que una conexión puede estar en uso
spring.datasource.hikari.max-lifetime=1800000
# Validación para evitar conexiones muertas
spring.datasource.hikari.connection-test-query=SELECT 1
# Evita errores cuando la BD se reinicia
spring.datasource.hikari.initialization-fail-timeout=0
# Evita que conexiones corruptas rompan el pool
spring.datasource.hikari.leak-detection-threshold=20000

# Spring Data JDBC
spring.data.jdbc.repositories.enabled=true

